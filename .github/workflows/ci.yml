name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Verificar tipos
        run: npm run typecheck

      - name: Rodar lint
        run: npm run lint

      - name: Gerar build
        run: npm run build

      - name: Rodar testes
        run: npm run test
